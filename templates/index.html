<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gerenciamento de Loja</title>
    <style>
        /* CSS Integrado */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body { display: flex; height: 100vh; background-color: #f4f4f9; }

        /* Barra Lateral */
        .sidebar { width: 260px; background: #2c3e50; color: white; padding: 20px; display: flex; flex-direction: column; }
        .sidebar h2 { margin-bottom: 30px; font-size: 1.5rem; color: #ecf0f1; }
        .sidebar ul { list-style: none; }
        .sidebar ul li { padding: 15px 0; border-bottom: 1px solid #34495e; cursor: pointer; transition: 0.3s; }
        .sidebar ul li:hover { padding-left: 10px; color: #3498db; }

        /* Área de Conteúdo */
        .content { flex: 1; padding: 40px; overflow-y: auto; }
        header h1 { color: #2c3e50; margin-bottom: 20px; }

        /* Cards de Estatísticas */
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-left: 5px solid #3498db; }
        .card h3 { color: #7f8c8d; font-size: 0.9rem; margin-bottom: 10px; }
        .card .number { font-size: 2rem; color: #2c3e50; font-weight: bold; }

        /* Ações */
        .quick-actions a {
            text-decoration: none;
            display: inline-block;
            padding: 12px 25px;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
            color: white;
        }

        .btn-cat { background: #27ae60; }
        .btn-prod { background: #3498db; }
        
        .quick-actions a:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <h2>Loja Manager</h2>
        <ul>
            <li>Dashboard</li>
            <li>Categorias</li>
            <li>Produtos</li>
            <li>Configurações</li>
        </ul>
    </nav>

    <main class="content">
        <header>
            <h1>Painel de Controle</h1>
        </header>

        <section class="stats">
            <div class="card">
                <h3>Total de Categorias</h3>
                <p class="number">12</p>
            </div>
            <div class="card">
                <h3>Total de Produtos</h3>
                <p class="number">156</p>
            </div>
        </section>
        <section class="quick-actions">
            <a href="cadastrar_produto.html" class="btn-prod">Nova Categoria</a>
            <a href="/produtos/cadastro" class="btn-prod">Novo Produto</a>      
        </section>
        
    </main>

</body>
</html>
