<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Categoria</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f9; padding: 40px; }
        .container { max-width: 500px; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin: auto; }
        h2 { margin-bottom: 20px; color: #2c3e50; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #34495e; font-weight: bold; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        button { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #219150; }
        .back-link { display: block; margin-top: 15px; text-align: center; color: #7f8c8d; text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Nova Categoria</h2>
    <form action="/categorias" method="POST">
        <div class="form-group">
            <label>Nome da Categoria:</label>
            <input type="text" name="nome" required>
        </div>
        
        <div class="form-group">
            <label>Descrição:</label>
            <textarea name="descricao" rows="3" required></textarea>
        </div>
        
        <button type="submit">Salvar Categoria</button>
    </form>
    
    <a href="/" class="back-link">Voltar para o Início</a>
</div>

</body>
</html>
